<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="form.css">
    <script src="https://kit.fontawesome.com/480fbb6428.js" crossorigin="anonymous"></script>

    <title>Formulário</title>
</head>

<body>
    <div id="form">
        <form action="">
            <h2 class="title">Cadastrar</h2>
            <label for="Username">Nome</label>
            <div class="input">
                <i class="fa-regular fa-circle-user"></i>
                <input id="username" name="usaername" placeholder="Username" type="text">
            </div>
            <label for="Email">Email</label>
            <div class="input">
                <i class="fa-solid fa-envelope"></i>
                <input id="email" name="email" placeholder="Email" type="text">
            </div>
            <label for="Senha">Senha</label>
            <div class="input">
                <i class="fa-solid fa-lock"></i>
                <input id="senha" name="senha" placeholder="Password" type="password">
            </div>
            <div id="btn">
                <button tipe="submit">Cadastrar</button>

            </div>
        </form>
    </div>

</body>

</html>
